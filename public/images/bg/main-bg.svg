<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1920" height="1080">
  <defs>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <filter id="noise2">
      <feTurbulence type="turbulence" baseFrequency="0.015 0.01" numOctaves="6" seed="5" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.18"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="overlay"/>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a0000" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.95"/>
    </radialGradient>
    <linearGradient id="base" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0000"/>
      <stop offset="40%" stop-color="#1a0505"/>
      <stop offset="100%" stop-color="#050005"/>
    </linearGradient>
  </defs>

  <!-- Base dark red/black gradient -->
  <rect width="1920" height="1080" fill="url(#base)"/>

  <!-- Heavy noise overlay -->
  <rect width="1920" height="1080" fill="#111" filter="url(#noise)" opacity="0.55"/>

  <!-- Turbulence texture -->
  <rect width="1920" height="1080" fill="#300" filter="url(#noise2)" opacity="0.3"/>

  <!-- Vignette -->
  <rect width="1920" height="1080" fill="url(#vignette)"/>

  <!-- Subtle horizontal scratch lines -->
  <g stroke="#ffffff" stroke-width="0.4" opacity="0.03">
    <line x1="0" y1="180" x2="1920" y2="175"/>
    <line x1="0" y1="340" x2="1920" y2="345"/>
    <line x1="0" y1="520" x2="1920" y2="516"/>
    <line x1="0" y1="700" x2="1920" y2="703"/>
    <line x1="0" y1="860" x2="1920" y2="858"/>
  </g>
</svg>
